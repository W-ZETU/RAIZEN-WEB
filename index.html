<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETU GEN | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles for the dark theme */
        body { background: #010204; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        /* Professional frosted glass effect for cards */
        .cyber-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; backdrop-filter: blur(20px); }
        /* Gradient button style */
        .gen-btn { background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 14px; font-weight: 800; transition: 0.3s; }
        /* Styling the dropdown menus */
        select { background: #000 !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        /* Modal setup for the redeem section */
        #genModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(25px); align-items: center; justify-content: center; }
        /* Pulsing green light for live stock status */
        .pulse { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; animation: pulse-gen 2s infinite; }
        @keyframes pulse-gen { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter" style="font-family: 'Syncopate';">ZETU<span class="text-blue-500">GEN</span></h1>
        <button id="authBtn" onclick="authDiscord()" class="bg-[#5865f2] px-6 py-2 rounded-full font-bold text-xs hover:scale-105 transition">LOGIN WITH DISCORD</button>
    </nav>

    <div class="max-w-5xl mx-auto px-6 mt-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="cyber-card p-6 border-l-4 border-blue-500">
                <p class="text-[9px] text-gray-500 font-bold uppercase">Live Inventory</p>
                <h2 id="totalStock" class="text-3xl font-black">0</h2>
            </div>
            <div class="cyber-card p-6 border-l-4 border-purple-500">
                <p class="text-[9px] text-gray-500 font-bold uppercase">Total Generations</p>
                <h2 class="text-3xl font-black">28</h2>
            </div>
            <div class="cyber-card p-6 border-l-4 border-green-500">
                <p class="text-[9px] text-gray-500 font-bold uppercase">Cloud Status</p>
                <h2 class="text-2xl font-black text-green-500 uppercase">Secure</h2>
            </div>
            <div class="cyber-card p-6 border-l-4 border-orange-500">
                <p class="text-[9px] text-gray-500 font-bold uppercase">Membership</p>
                <h2 id="userStatus" class="text-2xl font-black uppercase">Guest</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="cyber-card p-8">
                <h2 class="text-lg font-bold italic mb-6 uppercase"><i class="fas fa-bolt text-blue-500 mr-2"></i> Control Panel</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block">Select Tier</label>
                        <select id="catSelect" onchange="updateServices()">
                            <option value="FREE">🟢 FREE</option>
                            <option value="PREMIUM">🟣 PREMIUM</option>
                            <option value="PAID">🟠 PAID</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block">Select Service</label>
                        <select id="serSelect"></select>
                    </div>
                    <button onclick="handleGenerate()" class="w-full gen-btn py-4 uppercase tracking-widest text-sm shadow-lg">Generate Now</button>
                </div>
            </div>

            <div class="cyber-card p-8">
                <h2 class="text-lg font-bold italic mb-6 uppercase flex justify-between">Live Stock <span class="pulse"></span></h2>
                <div id="stockList" class="space-y-3"></div>
            </div>
        </div>
        <p class="text-center mt-20 text-[10px] font-bold tracking-[15px] text-white/5 uppercase">GEN BY ZETU</p>
    </div>

    <div id="genModal">
        <div class="cyber-card p-10 w-full max-w-sm text-center">
            <h2 class="text-xl font-bold italic mb-6 uppercase">Redeem Key</h2>
            <input id="userKey" type="text" placeholder="ENTER ACCESS KEY" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-center uppercase outline-none focus:border-blue-500">
            <button onclick="submitRedeem()" class="w-full gen-btn py-4 mb-4 text-sm uppercase">Claim Account</button>
            <p id="statusMsg" class="mt-4 text-xs font-bold text-blue-400 hidden italic">Sending to your Discord DM... 📩</p>
            <p class="mt-8 text-[10px] text-gray-700 font-bold cursor-pointer uppercase" onclick="closeModal()">Close</p>
        </div>
    </div>

    <script>
        // --- YOUR DISCORD CLIENT ID ---
        const CLIENT_ID = '1479188425268527289'; 
        
        // --- INITIAL DATA ---
        let stock = [
            { tier: 'FREE', service: 'CRUNCHYROLL', count: 63 },
            { tier: 'FREE', service: 'DISNEY+', count: 7 },
            { tier: 'PREMIUM', service: 'SPOTIFY', count: 375 },
            { tier: 'PAID', service: 'NETFLIX', count: 49 },
            { tier: 'PAID', service: 'STEAM', count: 352 }
        ];
        let isLoggedIn = false;

        // --- DISCORD AUTHENTICATION ---
        function authDiscord() {
            const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=identify`;
            window.location.href = authUrl; // Redirect to Discord login
        }

        // --- CHECK IF USER IS LOGGED IN ---
        function checkLoginStatus() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                isLoggedIn = true;
                document.getElementById('authBtn').innerText = "CONNECTED";
                document.getElementById('authBtn').className = "bg-green-600 px-6 py-2 rounded-full font-bold text-xs";
                document.getElementById('userStatus').innerText = "Verified User";
                // Hide the token from the URL bar
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // --- UPDATING SERVICE LIST BASED ON SELECTED TIER ---
        function updateServices() {
            const cat = document.getElementById('catSelect').value;
            const select = document.getElementById('serSelect');
            select.innerHTML = ''; // Clear current selection
            stock.filter(s => s.tier === cat).forEach(s => {
                select.innerHTML += `<option value="${s.service}">${s.service} [${s.count}]</option>`;
            });
        }

        // --- UPDATING STOCK UI ---
        function refreshUI() {
            const list = document.getElementById('stockList');
            list.innerHTML = '';
            let total = 0;
            stock.forEach(s => {
                total += s.count;
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5">
                        <span class="text-xs font-bold uppercase tracking-widest">${s.service}</span>
                        <div class="text-right">
                            <p class="text-lg font-black italic text-blue-500">${s.count}</p>
                            <span class="text-[8px] text-gray-600 font-bold uppercase">${s.tier}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('totalStock').innerText = total;
            updateServices();
        }

        // --- MODAL CONTROLS ---
        function handleGenerate() {
            if(!isLoggedIn) return alert("Please Login with Discord first!");
            document.getElementById('genModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('genModal').style.display = 'none'; }

        // --- KEY REDEMPTION LOGIC ---
        async function submitRedeem() {
            const key = document.getElementById('userKey').value;
            if(!key) return alert("Enter a key!");
            document.getElementById('statusMsg').classList.remove('hidden');
            setTimeout(() => {
                alert("Redemption Processed! Check your Discord DM.");
                closeModal();
            }, 2000);
        }

        // --- INITIALIZE PAGE ---
        window.onload = () => {
            refreshUI();
            checkLoginStatus();
        };
    </script>
</body>
</html>
